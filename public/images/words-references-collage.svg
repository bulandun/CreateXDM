<svg width="1536" height="1152" viewBox="0 0 1536 1152" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Words and references multimodal collage</title>
  <desc id="desc">A collage-inspired visual with rounded photo cards connected by curved blue arrows on a black background.</desc>
  <rect width="1536" height="1152" fill="#040404"/>

  <defs>
    <linearGradient id="cardA" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8FA7B5"/>
      <stop offset="1" stop-color="#2D3842"/>
    </linearGradient>
    <linearGradient id="cardB" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#D5C6AE"/>
      <stop offset="1" stop-color="#6F5A45"/>
    </linearGradient>
    <linearGradient id="cardC" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#B8BFC7"/>
      <stop offset="1" stop-color="#56606C"/>
    </linearGradient>
    <linearGradient id="cardD" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#D6CAB7"/>
      <stop offset="1" stop-color="#655747"/>
    </linearGradient>
    <linearGradient id="cardE" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#CABEA9"/>
      <stop offset="1" stop-color="#4C443A"/>
    </linearGradient>
    <linearGradient id="cardF" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#D1BFA7"/>
      <stop offset="1" stop-color="#7A6751"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0 0L10 5L0 10V0Z" fill="#3D7CFF"/>
    </marker>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
  </defs>

  <path d="M280 500C360 440 390 320 470 300" stroke="#3D7CFF" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M650 110C700 10 780 10 820 120" stroke="#3D7CFF" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M950 340C1020 340 1080 330 1130 360" stroke="#3D7CFF" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M180 730C340 730 420 780 480 840" stroke="#3D7CFF" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M620 900C700 820 760 820 820 790" stroke="#3D7CFF" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M920 500C920 610 980 620 1080 640" stroke="#3D7CFF" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M1060 860C1140 840 1170 760 1220 700" stroke="#3D7CFF" stroke-width="3" marker-end="url(#arrow)"/>

  <g opacity="0.15" filter="url(#soft)">
    <circle cx="770" cy="330" r="200" fill="#4E89FF"/>
  </g>

  <rect x="160" y="360" width="260" height="410" rx="24" fill="url(#cardC)"/>
  <rect x="460" y="130" width="300" height="270" rx="24" fill="url(#cardB)"/>
  <rect x="680" y="270" width="280" height="270" rx="24" fill="url(#cardA)"/>
  <rect x="1080" y="300" width="260" height="270" rx="24" fill="url(#cardD)"/>
  <rect x="1200" y="470" width="300" height="280" rx="24" fill="url(#cardE)"/>
  <rect x="500" y="700" width="290" height="300" rx="24" fill="url(#cardF)"/>
  <rect x="740" y="620" width="310" height="250" rx="24" fill="url(#cardD)"/>

  <g fill="#FFFFFF" fill-opacity="0.3">
    <circle cx="220" cy="430" r="26"/>
    <circle cx="520" cy="190" r="22"/>
    <circle cx="730" cy="325" r="20"/>
    <circle cx="1130" cy="360" r="20"/>
    <circle cx="1240" cy="550" r="18"/>
    <circle cx="550" cy="760" r="20"/>
    <circle cx="820" cy="700" r="18"/>
  </g>
</svg>
